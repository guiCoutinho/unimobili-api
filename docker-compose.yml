services:
  db:
    image: postgres:16-alpine
    container_name: agenda-postgres
    environment:
      POSTGRES_DB: agenda
      POSTGRES_USER: agenda
      POSTGRES_PASSWORD: agenda
    ports:
      - "5432:5432"
    volumes:
      - agenda-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda -d agenda"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  agenda-pgdata:
